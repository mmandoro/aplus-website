<body>
<header class="nav">
  <div class="nav-in">
    <a class="logo" href="../index.html"><img src="../assets/brand/logo-transparent.png" alt="A-Plus Branding Technologies" class="logo-img" /></a>
    <nav class="links">
      <a href="../index.html#services">Services</a>
      <a href="../index.html#projects">Projects</a>
      <a href="../index.html#contact">Contact</a>
      <a href="index.html" class="on">Blog</a>
      <a class="btn btn-primary" href="../index.html#contact" style="padding:11px 20px">Get free demo</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <div class="crumbs"><a href="../index.html">Home</a> &nbsp;/&nbsp; Blog</div>
  <div class="page-head">
    <span class="kicker">Insights</span>
    <h1 style="margin-top:18px">Get found. Get <span class="grad-text">booked.</span></h1>
    <p>Practical, no-nonsense advice on getting more customers online — for local businesses across Cape Town.</p>
  </div>
  <div class="grid-blog" id="blog-list"></div>
</div>

<footer>
  <div class="wrap foot-in">
    <span>© <span id="yr"></span> A-Plus Branding Technologies · Blouberg, Cape Town</span>
    <span><a href="../index.html">Home</a> · <a href="../index.html#contact">Contact</a></span>
  </div>
</footer>

<script src="../assets/posts.js"></script>
<script>
document.getElementById('yr').textContent=new Date().getFullYear();
function fmtDate(s){try{return new Date(s).toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'});}catch(e){return s;}}
const PFX = location.pathname.includes('/blog/') ? '../' : '';
const list=document.getElementById('blog-list');
(window.POSTS||[]).forEach(b=>{
  const a=document.createElement('a'); a.className="blogcard"; a.href=PFX+b.url;
  a.innerHTML=`<div class="bc-tag">${b.tag} · ${fmtDate(b.date)}</div><h2>${b.title}</h2><p>${b.excerpt}</p><span class="bc-go">Read more →</span>`;
  list.appendChild(a);
});
</script>
</body>
</html>
